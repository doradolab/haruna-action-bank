<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>榛名の行動貯金</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <header class="header">
     <h1>榛名の行動貯金</h1>
<div class="subtitle">小さな行動を、未来への積立に。</div>
<div class="date" id="date"></div>
    </header>

    <section class="point-card">
      <div class="label">累積行動貯金</div>
      <div class="total-point" id="totalPoint">0 pt</div>
      <div class="today-point">今日の貯金：<span id="todayPoint">0 pt</span></div>
      
<div class="rank-box">
  <div class="rank-divider"></div>
  <div class="rank-name">積立<span id="rankName">Lv.1「はじめの積立」</span></div>
  <div class="rank-next" id="rankNext">次のランクまで あと500pt</div>
  <div class="rank-bar">
    <div class="rank-bar-fill" id="rankBarFill"></div>
  </div>
</div>
      
    </section>

    <section class="missions" id="missionList"></section>
<section class="history">
  <div class="history-title">過去7日間の行動貯金</div>
  <div class="history-list" id="historyList"></div>
</section>
   <section class="message-box">
  <div class="message-label">榛名より</div>
  <div class="message" id="message">
    提督、今日も小さく前進しましょう。
  </div>
</section>
    <div class="footer">
      1任務 = 100pt / 1日最大300pt
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
